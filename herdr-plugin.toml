id = "herdr-focus-notify"
name = "Herdr Focus Notify"
version = "0.3.6"
min_herdr_version = "0.7.0"
description = "Clickable desktop notifications that focus the relevant Herdr agent pane."
platforms = ["macos"]

[[build]]
command = ["cargo", "build", "--release"]

[[actions]]
id = "test"
title = "Send test focus notification"
command = ["target/release/herdr-focus-notify", "--test"]

[[actions]]
id = "focus-latest"
title = "Focus latest active notification pane"
command = ["target/release/herdr-focus-notify", "--focus-latest"]

[[events]]
on = "pane.agent_status_changed"
command = ["target/release/herdr-focus-notify"]

[[events]]
on = "pane.focused"
command = ["target/release/herdr-focus-notify"]
