name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Release build
        run: cargo build --release
